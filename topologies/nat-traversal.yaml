metadata:
  name: nat-traversal
  description: "4-node NAT traversal topology with relay and clients behind NAT"
  version: "2.0"
  tags: ["nat", "relay", "p2p", "traversal"]

network:
  name: benchscale-nat-traversal
  subnet: "10.300.0.0/24"

nodes:
  - name: relay-server
    image: ubuntu
    env:
      ROLE: relay
      PUBLIC_IP: "true"
    network_conditions:
      latency_ms: 10
      packet_loss_percent: 0.1
      bandwidth_kbps: 500000  # 500 Mbps

  - name: client-1-behind-nat
    image: ubuntu
    env:
      ROLE: client
      BEHIND_NAT: "true"
      CLIENT_ID: "1"
    network_conditions:
      latency_ms: 30
      packet_loss_percent: 0.5
      bandwidth_kbps: 50000  # 50 Mbps

  - name: client-2-behind-nat
    image: ubuntu
    env:
      ROLE: client
      BEHIND_NAT: "true"
      CLIENT_ID: "2"
    network_conditions:
      latency_ms: 40
      packet_loss_percent: 1.0
      bandwidth_kbps: 30000  # 30 Mbps

  - name: client-3-behind-nat
    image: ubuntu
    env:
      ROLE: client
      BEHIND_NAT: "true"
      CLIENT_ID: "3"
    network_conditions:
      latency_ms: 50
      packet_loss_percent: 2.0
      bandwidth_kbps: 20000  # 20 Mbps
