metadata:
  name: simple-lan
  description: "Simple 2-node LAN topology for basic testing"
  version: "2.0"
  tags: ["lan", "simple", "basic"]

network:
  name: benchscale-simple-lan
  subnet: "10.100.0.0/24"
  conditions:
    latency_ms: 1
    packet_loss_percent: 0.0
    bandwidth_kbps: 1000000  # 1 Gbps

nodes:
  - name: node-1
    image: ubuntu
    env:
      ROLE: server
      NODE_ID: "1"
  - name: node-2
    image: ubuntu
    env:
      ROLE: client
      NODE_ID: "2"
