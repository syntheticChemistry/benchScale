metadata:
  name: p2p-3-tower
  description: "3-node P2P federation topology simulating SF, NY, and London"
  version: "2.0"
  tags: ["p2p", "federation", "wan", "multi-region"]

network:
  name: benchscale-p2p-3-tower
  subnet: "10.200.0.0/24"

nodes:
  - name: tower-sf
    image: ubuntu
    env:
      ROLE: tower
      REGION: san-francisco
      TOWER_ID: "1"
    network_conditions:
      latency_ms: 5
      packet_loss_percent: 0.1
      bandwidth_kbps: 100000  # 100 Mbps

  - name: tower-ny
    image: ubuntu
    env:
      ROLE: tower
      REGION: new-york
      TOWER_ID: "2"
    network_conditions:
      latency_ms: 50
      packet_loss_percent: 0.2
      bandwidth_kbps: 100000  # 100 Mbps

  - name: tower-london
    image: ubuntu
    env:
      ROLE: tower
      REGION: london
      TOWER_ID: "3"
    network_conditions:
      latency_ms: 100
      packet_loss_percent: 0.5
      bandwidth_kbps: 50000  # 50 Mbps
